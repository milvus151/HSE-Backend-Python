services:
  db:
    image: postgres:15
    container_name: hw5_postgres
    restart: always
    environment:
      POSTGRES_DB: hw5_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret_password
    volumes:
      - pg_data:/var/lib/postgresql/data
    expose:
      - 5432
    networks:
      - hw5_network

volumes:
  pg_data:

networks:
  hw5_network:
    name: hw5_net
