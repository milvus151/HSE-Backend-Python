services:
  backend:
    build: .
    container_name: hw5_django
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_DB=hw5_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret_password
      - POSTGRES_HOST=hw5_postgres
    networks:
      - hw5_net

networks:
  hw5_net:
    external: true
